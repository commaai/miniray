services:
  redis:
    image: redis:latest
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.ci
    depends_on:
      redis:
        condition: service_healthy
    privileged: true
    # Let D-state cleanup watchdogs survive the worker process exiting.
    pid: host
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      - REDIS_HOST=redis
      - PIPELINE_QUEUE=miniray-test
      - TRITON_SERVER_ENABLED=0
      - USE_MAIN_RESULT_REDIS=1
      - TASK_UID=0
    command: python3 /app/miniray/worker.py
    restart: on-failure

  test:
    build:
      context: .
      dockerfile: Dockerfile.ci
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      - REDIS_HOST=redis
      - MINIRAY_QUEUE=miniray-test
      - PENDING_TASK_SAFETY_TTL=60
